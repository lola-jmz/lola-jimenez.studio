# =============================================================================
# Railway Configuration - Lola Jiménez Studio
# =============================================================================
# Documentación: https://docs.railway.app/reference/config-as-code
# =============================================================================

[build]
# Usar el Dockerfile para build
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Comando de inicio (usa variable $PORT de Railway)
startCommand = "uvicorn api.run_fastapi:app --host 0.0.0.0 --port $PORT"

# Health check para verificar que la app está funcionando
healthcheckPath = "/health"
healthcheckTimeout = 30

# Política de reinicio ante fallos
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Número de réplicas (1 para plan básico)
numReplicas = 1
