[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
    "**/*.py",
    "requirements.txt",
    "Dockerfile",
    "docs/LOLA_FLASH.md",
    "frontend/**/*",
    "!frontend/out/**/*",
    "!frontend/.next/**/*",
    "!**/*.md",
    "!docs/**/*",
    "!.guus/**/*",
    "!tests/**/*",
    "!**/*_test.py",
    "!**/test_*.py"
]

[deploy]
startCommand = "uvicorn api.run_fastapi:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
